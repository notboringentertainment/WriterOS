<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WriterOS · Sam's Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          hsl(220 13% 9%);
    --surface:     hsl(220 13% 12%);
    --sidebar:     hsl(220 13% 10%);
    --border:      hsl(220 13% 18%);
    --chip:        hsl(220 13% 15%);
    --input:       hsl(220 13% 11%);
    --row-active:  hsl(220 13% 15%);
    --fg:          hsl(220 9% 95%);
    --fg-muted:    hsl(220 9% 60%);
    --primary:     hsl(260 100% 80%);
    --p-sam:       hsl(45 100% 75%);
    --p-casey:     hsl(200 100% 75%);
    --p-oliver:    hsl(120 60% 70%);
    --p-maya:      hsl(320 70% 75%);
    --p-zoe:       hsl(270 60% 75%);
    --p-alex:      hsl(15 80% 70%);
    --sans:  'Inter', system-ui, sans-serif;
    --serif: 'Crimson Text', Georgia, serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); height: 100%; }
  body { overflow: hidden; }
  * { box-sizing: border-box; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="workspace-home.jsx"></script>
<script type="text/babel" src="workspace-sam.jsx"></script>
<script type="text/babel" src="workspace-casey.jsx"></script>
<script type="text/babel" src="workspace-oliver.jsx"></script>
<script type="text/babel" src="workspace-maya.jsx"></script>
<script type="text/babel" src="workspace-zoe.jsx"></script>
<script type="text/babel" src="workspace-marcus.jsx"></script>

<script type="text/babel" data-presets="react">
  const DEFAULTS = /*EDITMODE-BEGIN*/{
    "primaryHue": 260,
    "samHue": 45,
    "serifDisplay": "Crimson Text"
  }/*EDITMODE-END*/;

  function TweaksPanel({ vals, setVals }) {
    const [open, setOpen] = React.useState(true);
    React.useEffect(() => {
      const r = document.documentElement;
      r.style.setProperty('--primary', `hsl(${vals.primaryHue} 100% 80%)`);
      r.style.setProperty('--p-sam',   `hsl(${vals.samHue} 100% 75%)`);
      r.style.setProperty('--serif', vals.serifDisplay === 'Crimson Text'
        ? "'Crimson Text', Georgia, serif"
        : vals.serifDisplay === 'Fraunces'
          ? "'Fraunces', Georgia, serif"
          : vals.serifDisplay === 'Lora'
            ? "'Lora', Georgia, serif"
            : "Georgia, serif");
    }, [vals]);
    const row = { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '6px 0' };
    return (
      <div style={{
        position: 'fixed', bottom: 18, right: 18, zIndex: 1000,
        width: open ? 244 : 'auto',
        background: 'rgba(20,18,25,0.94)', backdropFilter: 'blur(10px)',
        border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10,
        padding: open ? '10px 12px' : '6px 10px',
        color: '#e9e6f0', fontFamily: 'Inter, sans-serif', fontSize: 12,
        boxShadow: '0 10px 30px rgba(0,0,0,0.4)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }} onClick={() => setOpen(o => !o)}>
          <span style={{ fontWeight: 600, letterSpacing: 0.3, fontSize: 11, textTransform: 'uppercase' }}>Tweaks</span>
          <span style={{ opacity: 0.5 }}>{open ? '▾' : '▸'}</span>
        </div>
        {open && (
          <div style={{ marginTop: 6 }}>
            <div style={row}><span>Primary hue</span>
              <input type="range" min="200" max="330" value={vals.primaryHue}
                onChange={e => setVals({ ...vals, primaryHue: +e.target.value })} /></div>
            <div style={row}><span>Sam hue</span>
              <input type="range" min="0" max="90" value={vals.samHue}
                onChange={e => setVals({ ...vals, samHue: +e.target.value })} /></div>
            <div style={row}><span>Display face</span>
              <select value={vals.serifDisplay} onChange={e => setVals({ ...vals, serifDisplay: e.target.value })}
                style={{ background: 'rgba(255,255,255,0.08)', color: '#fff', border: '1px solid rgba(255,255,255,0.14)', borderRadius: 4, padding: '3px 6px', fontFamily: 'inherit', fontSize: 12 }}>
                <option>Crimson Text</option><option>Lora</option><option>Fraunces</option><option>Georgia</option>
              </select>
            </div>
          </div>
        )}
      </div>
    );
  }

  function App() {
    const [vals, setVals] = React.useState(DEFAULTS);
    const [editMode, setEditMode] = React.useState(false);
    React.useEffect(() => {
      const onMsg = (e) => {
        const d = e.data || {};
        if (d.type === '__activate_edit_mode') setEditMode(true);
        if (d.type === '__deactivate_edit_mode') setEditMode(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);
    React.useEffect(() => {
      if (!editMode) return;
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: vals }, '*');
    }, [vals, editMode]);

    const [room, setRoom] = React.useState(() => localStorage.getItem('writeros-room') || 'home');
    window.__setRoom = setRoom;
    React.useEffect(() => { localStorage.setItem('writeros-room', room); }, [room]);

    return (
      <>
        {room === 'home'   && <StudioHome/>}
        {room === 'sam'    && <SamWorkspace/>}
        {room === 'casey'  && <CaseyWorkspace/>}
        {room === 'oliver' && <OliverWorkspace/>}
        {room === 'maya'   && <MayaWorkspace/>}
        {room === 'zoe'    && <ZoeWorkspace/>}
        {room === 'marcus' && <MarcusWorkspace/>}
        <TweaksPanel vals={vals} setVals={setVals} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
